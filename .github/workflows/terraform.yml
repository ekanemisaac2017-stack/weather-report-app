name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials (from GitHub Secrets)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Step 4: Initialize Terraform (download providers)
      - name: Terraform Init
        run: terraform init

      # Step 5: Check formatting (optional but good)
      - name: Terraform Format Check
        run: terraform fmt -check

      # Step 6: Apply Terraform (deploy infrastructure)
      - name: Terraform Apply
        run: terraform apply -auto-approve